<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería de Degustaciones</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
    /* Diseño del grid de 2 columnas que ya tienes en index_7 */
    body { background: #f5f5f5; font-family: sans-serif; padding-top: 120px; }
    .header { position: fixed; top: 0; left: 0; right: 0; background: #2563eb; color: white; padding: 15px; text-align: center; z-index: 100; }
    .reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 10px; border: 1px solid #eee; }
    .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
    .fab { position: fixed; bottom: 20px; right: 20px; background: #2563eb; color: white; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); cursor: pointer; }
    /* Estilos del formulario Drawer... */
  </style>
</head>
<body>
  <div class="header">
    <h2>Galería FuXion</h2>
    <p>Prueba social compartida</p>
  </div>

  <div class="reviews-grid" id="grid"></div>
  <button class="fab" onclick="abrirForm()">+</button>

  <script>
    // Misma config de Firebase que el anterior
    const firebaseConfig = { ... };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // SOLO lee de la colección 'reviews'
    async function load() {
      const snap = await db.collection('reviews').orderBy('createdAt','desc').get();
      const grid = document.getElementById('grid');
      snap.forEach(doc => {
        const d = doc.data();
        grid.innerHTML += `
          <div class="card">
            ${d.photoUrl ? `<img src="${d.photoUrl}">` : ''}
            <div style="font-weight:bold; font-size:14px; margin-top:5px;">${d.name}</div>
            <div style="color:#f59e0b;">${'⭐'.repeat(d.rating)}</div>
          </div>`;
      });
    }
    load();

    // El formulario de esta página SOLO guarda en 'reviews'
    // SIN usar el Google Script.
  </script>
</body>
</html>
