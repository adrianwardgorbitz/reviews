<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reseñas FuXion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #333; }
    
    /* HEADER: Full Width y NO sticky */
    header { 
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); 
      color: white; 
      padding: 40px 20px; 
      text-align: center; 
      width: 100%; 
    }
    header h1 { font-size: 26px; margin-bottom: 8px; }
    header p { font-size: 14px; opacity: 0.9; }

    /* STATS: Estilo foto 2 (Línea divisoria central) */
    .stats { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      background: white; 
      width: 100%; 
      border-bottom: 1px solid #eee; 
    }
    .stat-card { padding: 25px 10px; text-align: center; }
    .stat-card:first-child { border-right: 1px solid #eee; }
    .stat-number { font-size: 32px; font-weight: 700; color: #2563eb; display: block; }
    .stat-label { font-size: 12px; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* FILTROS: Full Width */
    .filters { 
      background: white; 
      padding: 25px 20px; 
      text-align: center; 
      width: 100%; 
      border-bottom: 1px solid #eee;
      margin-bottom: 25px;
    }
    .filters label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 14px; }
    .filters select { 
      width: 100%; max-width: 450px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 15px; 
    }
    .checkbox-label { display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }

    /* GRID: 2 Columnas reales */
    .container { max-width: 1000px; margin: 0 auto; padding: 0 12px; }
    .reviews-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px; 
      margin-bottom: 100px; 
      align-items: start; 
    }
    
    .review-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; cursor: pointer; }
    .review-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .review-instagram { color: #E1306C; font-size: 10px; font-weight: 700; display: block; margin-bottom: 6px; }
    .review-products-tag { font-size: 9px; color: #2563eb; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
    
    .review-photos { width: 100%; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
    .review-photos img { width: 100%; height: auto; display: block; }
    
    /* TEXTO: Sin recortes */
    .review-text { font-size: 12px; line-height: 1.5; color: #444; font-style: italic; }

    /* BOTÓN FLOTANTE */
    .cta-button { position: fixed; bottom: 30px; right: 20px; background: #2563eb; color: white; border: none; padding: 16px 24px; border-radius: 50px; font-weight: 700; z-index: 99; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }

    /* FORM DROPDOWN */
    .form-dropdown { position: fixed; bottom: 0; left: 0; width: 100%; height: 0; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); overflow-y: auto; transition: height 0.4s ease; z-index: 1000; }
    .form-dropdown.active { height: 95vh; }
    .form-header { padding: 20px; background: #2563eb; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
    
    #reviewForm { padding: 25px; }
    #reviewForm label { font-weight: 700; display: block; margin-top: 15px; font-size: 14px; }
    #reviewForm input, #reviewForm textarea, #reviewForm select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; font-size: 15px; }
    #reviewForm button#submitBtn { width: 100%; padding: 18px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: 700; margin-top: 30px; font-size: 16px; }

    .stars span { cursor: pointer; color: #e0e0e0; font-size: 35px; margin-right: 5px; }
    .stars span.active { color: #FFB800; }

    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 15px; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; }
  </style>
</head>
<body>

  <header>
    <h1>✨ Reseñas FuXion</h1>
    <p>Tu opinión nos ayuda a crecer</p>
  </header>

  <div class="stats">
    <div class="stat-card"><span class="stat-number" id="totalCount">0</span><span class="stat-label">Reseñas</span></div>
    <div class="stat-card"><span class="stat-number" id="photo
