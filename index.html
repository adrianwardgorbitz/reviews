    .review-photos { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin: 10px 0; }

    .form-dropdown.active { height: 90vh; }
    .form-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #2563eb; color: white; position: sticky; top: 0; }
    #reviewForm { padding: 20px; font-size: 13px; }
    #reviewForm label { display: block; font-weight: 600; margin-top: 12px; }
    #reviewForm input, #reviewForm textarea, #reviewForm select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; }
    .stars span { cursor: pointer; color: #e0e0e0; font-size: 24px; }
