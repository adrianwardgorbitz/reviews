<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseñas EN VIVO - FuXion Madrid Degustaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff4d00;
            --secondary: #1a1a1a;
            --accent: #ffa500;
            --light: #f8f8f8;
            --border: #e0e0e0;
            --text: #333;
            --text-light: #666;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            font-family: 'Sora', sans-serif;
        }

        .header p {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .form-section {
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 20px;
            height: fit-content;
            animation: slideLeft 0.6s ease;
        }

        .form-section h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--secondary);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-group select,
        .form-group textarea,
        .form-group input[type="tel"] {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group select:focus,
        .form-group textarea:focus,
        .form-group input[type="tel"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 77, 0, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .photo-upload {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 77, 0, 0.02);
        }

        .photo-upload:hover {
            border-color: var(--primary);
            background: rgba(255, 77, 0, 0.05);
        }

        .photo-upload input {
            display: none;
        }

        .photo-upload-text {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .photo-upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .photo-preview {
            margin-top: 12px;
            position: relative;
        }

        .photo-preview img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            max-height: 200px;
        }

        .photo-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 16px;
            cursor: pointer;
        }

        .rating-group {
            margin-bottom: 18px;
        }

        .rating-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .stars {
            display: flex;
            gap: 8px;
            font-size: 28px;
        }

        .star {
            cursor: pointer;
            color: #ddd;
            transition: all 0.2s ease;
        }

        .star:hover,
        .star.active {
            color: var(--primary);
            transform: scale(1.15);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 77, 0, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .reviews-section {
            animation: slideRight 0.6s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid var(--primary);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            font-weight: 500;
        }

        .reviews-list-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--secondary);
        }

        #reviewsList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .review-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid var(--primary);
            animation: slideUp 0.5s ease;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .review-product {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }

        .review-time {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .review-stars {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .review-comment {
            font-size: 14px;
            color: var(--text);
            font-style: italic;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 77, 0, 0.05);
            border-radius: 6px;
        }

        .review-photo {
            margin: 12px 0;
            border-radius: 8px;
            overflow: hidden;
            max-height: 300px;
        }

        .review-photo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .review-whatsapp {
            font-size: 12px;
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .success-message,
        .error-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10000;
            animation: slideUp 0.4s ease;
        }

        .success-message {
            background: var(--success);
            color: white;
        }

        .error-message {
            background: var(--error);
            color: white;
        }

        .success-message.hide,
        .error-message.hide {
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .form-section {
                position: static;
            }

            .header h1 {
                font-size: 28px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
